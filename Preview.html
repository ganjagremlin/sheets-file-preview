<!--
  Preview.html — shared partial included by both Sidebar.html and Dialog.html.
  Contains the styles, rendering logic, and content area.

  Supports three render modes, determined client-side by file extension / MIME type:
    markdown  — rendered with markdown-it (existing behaviour)
    text      — plain text shown in a <pre> block
    iframe    — Google Drive preview iframe (PDFs, images, DOCX, XLSX, etc.)

  Expected template variables (set by including template):
    fileName  — string
    content   — string | null   (text/markdown only; null for iframe types)
    fileId    — string | null   (Drive file ID; used to build iframe URL)
    mimeType  — string | null   (Drive MIME type)
    error     — string | null
    mode      — "sidebar" | "dialog"
-->

<script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
<style>
  /* Catppuccin Mocha palette */
  :root {
    --base:    #1e1e2e;
    --mantle:  #181825;
    --surface0:#313244;
    --surface1:#45475a;
    --text:    #cdd6f4;
    --subtext: #a6adc8;
    --overlay: #6c7086;
    --blue:    #89b4fa;
    --lavender:#b4befe;
    --green:   #a6e3a1;
    --yellow:  #f9e2af;
    --peach:   #fab387;
    --red:     #f38ba8;
    --mauve:   #cba6f7;
  }

  * { box-sizing: border-box; }

  html {
    height: 100%;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--base);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.55;
  }

  /* Flex column so the content/iframe area fills remaining height */
  body {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* In dialog mode, give the body more breathing room. */
  body.dialog { font-size: 14px; line-height: 1.65; }

  .header {
    flex-shrink: 0;
    position: sticky;
    top: 0;
    background: var(--mantle);
    border-bottom: 1px solid var(--surface0);
    padding: 10px 12px;
    z-index: 10;
  }

  body.dialog .header { padding: 12px 18px; }

  .header-title {
    font-size: 13px;
    color: var(--blue);
    font-weight: 600;
    word-break: break-word;
    margin: 0 0 6px 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  body.dialog .header-title { font-size: 15px; margin-bottom: 8px; }

  .header-actions { display: flex; gap: 6px; flex-wrap: wrap; }

  .btn {
    background: var(--surface0);
    color: var(--text);
    border: 1px solid var(--surface1);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.12s;
  }
  body.dialog .btn { font-size: 12px; padding: 5px 10px; }

  .btn:hover  { background: var(--surface1); }
  .btn:active { background: var(--overlay); }
  .btn.primary { color: var(--blue); border-color: var(--blue); }
  .btn.accent  { color: var(--mauve); border-color: var(--mauve); }

  /* Anchor styled as a button needs explicit color reset */
  a.btn { color: var(--text); display: inline-block; line-height: 1.2; }
  a.btn:hover { color: var(--text); }

  .auto-update {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--subtext);
    cursor: pointer;
    user-select: none;
    margin-left: auto;
  }
  .auto-update input[type="checkbox"] {
    accent-color: var(--mauve);
    cursor: pointer;
    margin: 0;
  }

  /* ---- Scroll area (text / markdown) ---- */
  #scroll-area {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
  }

  .content {
    padding: 12px;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  body.dialog .content { padding: 18px 22px; max-width: 760px; margin: 0 auto; }

  /* Markdown styling */
  .content h1, .content h2, .content h3,
  .content h4, .content h5, .content h6 {
    color: var(--lavender);
    font-weight: 600;
    margin-top: 1.2em;
    margin-bottom: 0.5em;
    line-height: 1.3;
  }
  .content h1 { font-size: 18px; border-bottom: 1px solid var(--surface0); padding-bottom: 4px; }
  .content h2 { font-size: 16px; border-bottom: 1px solid var(--surface0); padding-bottom: 3px; }
  .content h3 { font-size: 14px; }
  .content h4, .content h5, .content h6 { font-size: 13px; color: var(--subtext); }

  body.dialog .content h1 { font-size: 24px; }
  body.dialog .content h2 { font-size: 20px; }
  body.dialog .content h3 { font-size: 17px; }
  body.dialog .content h4, body.dialog .content h5, body.dialog .content h6 { font-size: 15px; }

  .content p { margin: 0.6em 0; }

  .content a {
    color: var(--blue);
    text-decoration: none;
    border-bottom: 1px dotted var(--blue);
  }
  .content a:hover { color: var(--lavender); border-bottom-style: solid; }

  .content strong { color: var(--peach); font-weight: 600; }
  .content em { color: var(--yellow); font-style: italic; }

  .content code {
    background: var(--surface0);
    color: var(--green);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
    font-size: 12px;
  }

  .content pre {
    background: var(--mantle);
    border: 1px solid var(--surface0);
    border-radius: 4px;
    padding: 8px 10px;
    overflow-x: auto;
    margin: 0.8em 0;
  }
  .content pre code {
    background: transparent;
    color: var(--text);
    padding: 0;
    font-size: 11.5px;
    line-height: 1.5;
  }
  body.dialog .content pre code { font-size: 13px; }

  /* Plain-text mode: full-width pre without inner padding tricks */
  .content .plain-text {
    white-space: pre-wrap;
    overflow-wrap: break-word; /* only break mid-word when a token is truly too long */
    font-family: "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
    font-size: 11.5px;
    line-height: 1.5;
    color: var(--text);
    background: transparent;
    border: none;
    padding: 0;
    margin: 0;
  }
  body.dialog .content .plain-text { font-size: 13px; }

  .content blockquote {
    border-left: 3px solid var(--mauve);
    margin: 0.8em 0;
    padding: 2px 0 2px 10px;
    color: var(--subtext);
    background: var(--mantle);
  }

  .content ul, .content ol { padding-left: 22px; margin: 0.5em 0; }
  .content li { margin: 0.2em 0; }
  .content ul li::marker, .content ol li::marker { color: var(--overlay); }

  .content input[type="checkbox"] {
    margin-right: 6px;
    accent-color: var(--green);
  }

  .content hr {
    border: none;
    border-top: 1px solid var(--surface0);
    margin: 1.2em 0;
  }

  .content table {
    border-collapse: collapse;
    width: 100%;
    margin: 0.8em 0;
    font-size: 12px;
  }
  .content th, .content td {
    border: 1px solid var(--surface0);
    padding: 4px 8px;
    text-align: left;
  }
  .content th { background: var(--mantle); color: var(--lavender); }

  .content img { max-width: 100%; height: auto; border-radius: 4px; }

  .status {
    padding: 12px;
    border-radius: 4px;
    margin: 12px;
    font-size: 12px;
  }
  .status.error   { background: rgba(243,139,168,0.1); color: var(--red);    border: 1px solid var(--red); }
  .status.warning { background: rgba(249,226,175,0.1); color: var(--yellow); border: 1px solid var(--yellow); }

  .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid var(--surface0);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- Iframe area ---- */
  #iframe-wrapper {
    flex: 1;
    min-height: 0;
    display: none; /* shown by JS when render mode is iframe */
  }

  #preview-iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: #fff; /* Drive preview has a white bg */
  }

  /* Resize controls — only shown in dialog mode */
  .resize-row {
    flex-shrink: 0;
    display: none;
    gap: 16px;
    align-items: center;
    padding: 8px 18px;
    background: var(--mantle);
    border-bottom: 1px solid var(--surface0);
    font-size: 11px;
    color: var(--subtext);
  }
  body.dialog .resize-row.visible { display: flex; flex-wrap: wrap; }

  .resize-control {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1 1 200px;
    min-width: 200px;
  }

  .resize-control label {
    color: var(--overlay);
    font-weight: 500;
    min-width: 18px;
  }

  .resize-control input[type="range"] {
    flex: 1;
    accent-color: var(--mauve);
    cursor: pointer;
  }

  .resize-value {
    color: var(--lavender);
    font-family: "SF Mono", Menlo, Consolas, monospace;
    min-width: 42px;
    text-align: right;
  }

  .resize-row .reset-link {
    color: var(--blue);
    cursor: pointer;
    text-decoration: none;
    border-bottom: 1px dotted var(--blue);
    font-size: 11px;
    margin-left: auto;
  }
  .resize-row .reset-link:hover { color: var(--lavender); }
</style>

<div class="header">
  <div class="header-title">
    <span id="file-icon">📄</span>
    <span id="file-name"><?= fileName ?></span>
  </div>
  <div class="header-actions">
    <button class="btn primary" onclick="reloadFile()" title="Reload from Drive (bypasses cache)">↻ Reload</button>
    <button class="btn" onclick="toggleRaw()" id="toggle-btn">View Raw</button>
    <a class="btn" id="open-in-drive" href="#" target="_blank" rel="noopener" title="Open this file in Google Drive" style="display:none; text-decoration:none;">↗ Open in Drive</a>
    <? if (mode === 'sidebar') { ?>
      <button class="btn accent" onclick="popOut()" title="Open in a wider, draggable dialog">↗ Pop out</button>
    <? } ?>
    <? if (mode === 'dialog') { ?>
      <button class="btn" onclick="toggleResize()" id="resize-btn" title="Show or hide resize controls">⇲ Resize</button>
    <? } ?>
    <? if (mode === 'sidebar') { ?>
      <label class="auto-update" title="Auto-update preview when you select a different file-name cell">
        <input type="checkbox" id="auto-update-toggle" />
        <span>Auto</span>
      </label>
    <? } ?>
  </div>
</div>

<? if (mode === 'dialog') { ?>
<div class="resize-row" id="resize-row">
  <div class="resize-control">
    <label for="width-slider">W</label>
    <input type="range" id="width-slider" />
    <span class="resize-value" id="width-value">—</span>
  </div>
  <div class="resize-control">
    <label for="height-slider">H</label>
    <input type="range" id="height-slider" />
    <span class="resize-value" id="height-value">—</span>
  </div>
  <a class="reset-link" onclick="resetSize()">Reset to default</a>
</div>
<? } ?>

<!-- Text / markdown content area -->
<div id="scroll-area">
  <div id="rendered" class="content"></div>
  <pre id="raw" class="content" style="display:none; white-space:pre-wrap; font-family: monospace; font-size: 12px;"></pre>
</div>

<!-- Drive iframe preview area (PDFs, images, DOCX, etc.) -->
<div id="iframe-wrapper">
  <iframe id="preview-iframe" allowfullscreen></iframe>
</div>

<script>
  // ---- Server-injected template values ----
  var FILE_NAME       = <?!= JSON.stringify(fileName) ?>;
  var FILE_ID         = <?!= JSON.stringify(fileId) ?>;
  var MIME_TYPE       = <?!= JSON.stringify(mimeType) ?>;
  var INITIAL_CONTENT = <?!= JSON.stringify(content) ?>;
  var INITIAL_ERROR   = <?!= JSON.stringify(error) ?>;
  var MODE            = <?!= JSON.stringify(mode) ?>;

  // Mutable globals so polling can swap to a different file in place.
  var RENDER_MODE = null;

  // Apply mode-specific body class for styling.
  if (MODE === 'dialog') document.body.classList.add('dialog');

  // ---- Render mode detection ----

  /**
   * Determines how to render based on file extension first, MIME type second.
   * Returns 'markdown', 'text', or 'iframe'.
   */
  function getRenderMode(fileName, mimeType) {
    var lower = (fileName || '').toLowerCase();
    if (lower.endsWith('.md') || lower.endsWith('.markdown')) return 'markdown';
    if (lower.endsWith('.txt')) return 'text';
    // Fallback: if Drive reports a plain text MIME, treat as text.
    if (mimeType === 'text/plain' || mimeType === 'text/markdown' ||
        mimeType === 'text/x-markdown') return 'text';
    return 'iframe';
  }

  // ---- markdown-it setup (lazy; reused across files) ----
  var md = window.markdownit({
    html: true,
    linkify: true,
    breaks: false,
    typographer: true
  });

  // ---- File-type icon ----
  function getFileIcon(fileName, mimeType) {
    var lower = (fileName || '').toLowerCase();
    if (lower.endsWith('.pdf'))  return '📕';
    if (lower.endsWith('.docx') || lower.endsWith('.doc'))  return '📝';
    if (lower.endsWith('.xlsx') || lower.endsWith('.xls') ||
        lower.endsWith('.csv'))  return '📊';
    if (lower.endsWith('.pptx') || lower.endsWith('.ppt'))  return '📋';
    if (lower.match(/\.(png|jpg|jpeg|gif|webp|svg|bmp|tiff?)$/)) return '🖼️';
    if (lower.endsWith('.txt')) return '📃';
    if (lower.endsWith('.md') || lower.endsWith('.markdown')) return '📄';
    return '📄';
  }

  // ---- Content rendering ----

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  /**
   * Renders text/markdown content into #rendered and #raw.
   * For iframe mode this is only called to show errors.
   */
  function renderContent(content, error) {
    var rendered = document.getElementById('rendered');
    var raw      = document.getElementById('raw');

    if (error) {
      rendered.innerHTML = '<div class="status error">⚠ ' + escapeHtml(error) + '</div>';
      raw.textContent = '';
      return;
    }

    if (!content) {
      rendered.innerHTML = '<div class="status warning">File is empty.</div>';
      raw.textContent = '';
      return;
    }

    if (RENDER_MODE === 'markdown') {
      var preprocessed = content
        .replace(/^(\s*[-*+]\s+)\[ \]\s+/gm,    '$1<input type="checkbox" disabled> ')
        .replace(/^(\s*[-*+]\s+)\[[xX]\]\s+/gm, '$1<input type="checkbox" checked disabled> ');
      rendered.innerHTML = md.render(preprocessed);
      raw.textContent = content;
    } else {
      // text mode
      rendered.innerHTML = '<pre class="plain-text">' + escapeHtml(content) + '</pre>';
      raw.textContent = content;
    }
  }

  /**
   * Shows the Drive iframe for the given file ID, hiding the scroll area.
   */
  function showIframe(fileId) {
    var scrollArea  = document.getElementById('scroll-area');
    var iframeWrap  = document.getElementById('iframe-wrapper');
    var iframe      = document.getElementById('preview-iframe');

    scrollArea.style.display = 'none';
    iframeWrap.style.display = 'block';
    iframe.src = 'https://drive.google.com/file/d/' + fileId + '/preview';
  }

  function showScrollArea() {
    document.getElementById('scroll-area').style.display = '';
    document.getElementById('iframe-wrapper').style.display = 'none';
  }

  /**
   * Renders the full UI for a file. Used both for the initial load and when
   * auto-update polling switches to a different file. Updates header, icon,
   * Open-in-Drive link, raw-toggle visibility, and content area.
   */
  function renderFile(fileName, fileId, mimeType, content, error) {
    FILE_NAME   = fileName;
    FILE_ID     = fileId;
    MIME_TYPE   = mimeType;
    RENDER_MODE = getRenderMode(fileName, mimeType);

    document.getElementById('file-name').textContent = fileName;
    document.getElementById('file-icon').textContent = getFileIcon(fileName, mimeType);

    // Open in Drive link: only meaningful when we have a fileId.
    var openLink = document.getElementById('open-in-drive');
    if (openLink) {
      if (fileId) {
        openLink.href = 'https://drive.google.com/file/d/' + fileId + '/view';
        openLink.style.display = '';
      } else {
        openLink.style.display = 'none';
      }
    }

    // "View Raw" only makes sense for markdown (two distinct views).
    var toggleBtn = document.getElementById('toggle-btn');
    if (toggleBtn) toggleBtn.style.display = (RENDER_MODE === 'markdown') ? '' : 'none';
    // When swapping files, drop back to rendered view.
    if (showingRaw) toggleRaw();

    if (RENDER_MODE === 'iframe') {
      if (error) {
        showScrollArea();
        renderContent(null, error);
      } else if (fileId) {
        showIframe(fileId);
      } else {
        showScrollArea();
        renderContent(null, 'Could not retrieve file ID for Drive preview.');
      }
    } else {
      showScrollArea();
      renderContent(content, error);
    }
  }

  // ---- Reload ----

  function reloadFile() {
    if (RENDER_MODE === 'iframe') {
      // For iframe mode, just bounce the iframe src.
      var iframe = document.getElementById('preview-iframe');
      if (iframe && FILE_ID) {
        iframe.src = '';
        setTimeout(function () {
          iframe.src = 'https://drive.google.com/file/d/' + FILE_ID + '/preview';
        }, 50);
      }
      return;
    }

    var rendered = document.getElementById('rendered');
    rendered.innerHTML = '<div class="content"><span class="spinner"></span> Reloading…</div>';
    google.script.run
      .withSuccessHandler(function (result) { renderContent(result.content, result.error); })
      .withFailureHandler(function (err)    { renderContent(null, err.message || 'Failed to reload.'); })
      .reloadFileContent(FILE_NAME);
  }

  // ---- Raw / rendered toggle (markdown only) ----

  var showingRaw = false;
  function toggleRaw() {
    showingRaw = !showingRaw;
    document.getElementById('rendered').style.display = showingRaw ? 'none' : 'block';
    document.getElementById('raw').style.display      = showingRaw ? 'block' : 'none';
    document.getElementById('toggle-btn').textContent = showingRaw ? 'View Rendered' : 'View Raw';
  }

  // ---- Pop out (sidebar mode only) ----

  function popOut() {
    google.script.run
      .withFailureHandler(function (err) {
        alert('Could not open dialog: ' + (err.message || err));
      })
      .showDialogForFile(FILE_NAME);
  }

  // ---- Dialog resize controls (dialog mode only) ----

  function toggleResize() {
    var row = document.getElementById('resize-row');
    if (!row) return;
    row.classList.toggle('visible');
  }

  function applySize(width, height) {
    if (google.script.host && google.script.host.setWidth) {
      google.script.host.setWidth(width);
      google.script.host.setHeight(height);
    }
  }

  function setupResizeControls() {
    var widthSlider  = document.getElementById('width-slider');
    var heightSlider = document.getElementById('height-slider');
    var widthVal     = document.getElementById('width-value');
    var heightVal    = document.getElementById('height-value');

    if (!widthSlider) return;

    google.script.run
      .withSuccessHandler(function (cfg) {
        widthSlider.min   = cfg.minWidth;
        widthSlider.max   = cfg.maxWidth;
        widthSlider.step  = 10;
        widthSlider.value = cfg.width;

        heightSlider.min   = cfg.minHeight;
        heightSlider.max   = cfg.maxHeight;
        heightSlider.step  = 10;
        heightSlider.value = cfg.height;

        widthVal.textContent  = cfg.width  + 'px';
        heightVal.textContent = cfg.height + 'px';

        widthSlider.addEventListener('input', function () {
          var w = parseInt(widthSlider.value, 10);
          var h = parseInt(heightSlider.value, 10);
          widthVal.textContent = w + 'px';
          applySize(w, h);
        });
        heightSlider.addEventListener('input', function () {
          var w = parseInt(widthSlider.value, 10);
          var h = parseInt(heightSlider.value, 10);
          heightVal.textContent = h + 'px';
          applySize(w, h);
        });

        var persist = function () {
          var w = parseInt(widthSlider.value, 10);
          var h = parseInt(heightSlider.value, 10);
          google.script.run.saveDialogSize(w, h);
        };
        widthSlider.addEventListener('change', persist);
        heightSlider.addEventListener('change', persist);
      })
      .withFailureHandler(function (err) {
        console.warn('Could not load resize config:', err);
      })
      .getDialogSizeConfig();
  }

  function resetSize() {
    google.script.run
      .withSuccessHandler(function (defaults) {
        var widthSlider  = document.getElementById('width-slider');
        var heightSlider = document.getElementById('height-slider');
        var widthVal     = document.getElementById('width-value');
        var heightVal    = document.getElementById('height-value');

        widthSlider.value  = defaults.width;
        heightSlider.value = defaults.height;
        widthVal.textContent  = defaults.width  + 'px';
        heightVal.textContent = defaults.height + 'px';
        applySize(defaults.width, defaults.height);
      })
      .resetDialogSize();
  }

  if (MODE === 'dialog') {
    setupResizeControls();
  }

  // ---- Initial render ----

  renderFile(FILE_NAME, FILE_ID, MIME_TYPE, INITIAL_CONTENT, INITIAL_ERROR);

  // ---- Auto-update polling (sidebar mode only) ----
  //
  // Apps Script's onSelectionChange runs in AuthMode.LIMITED and cannot drive
  // sidebar UI, so we poll instead. The toggle is persisted per-user.

  var POLL_INTERVAL_MS = 500;
  var pollTimer = null;
  var fetchSeq  = 0;       // monotonically increases; stale fetches are dropped
  var lastPolledFile = FILE_NAME;

  function startPolling() {
    if (pollTimer) return;
    pollTimer = setInterval(pollSelection, POLL_INTERVAL_MS);
  }

  function stopPolling() {
    if (!pollTimer) return;
    clearInterval(pollTimer);
    pollTimer = null;
  }

  function pollSelection() {
    if (document.hidden) return;
    google.script.run
      .withSuccessHandler(function (result) {
        // Selection isn't a valid file-name cell — leave the last preview in place.
        if (!result || !result.fileName) return;
        if (result.fileName === lastPolledFile) return;
        lastPolledFile = result.fileName;
        loadFile(result.fileName);
      })
      .withFailureHandler(function () { /* silent — transient errors shouldn't spam */ })
      .getActiveSelection();
  }

  function loadFile(fileName) {
    var seq = ++fetchSeq;
    google.script.run
      .withSuccessHandler(function (result) {
        if (seq !== fetchSeq) return;  // a newer fetch superseded us
        renderFile(fileName, result.fileId, result.mimeType, result.content, result.error);
      })
      .withFailureHandler(function (err) {
        if (seq !== fetchSeq) return;
        renderFile(fileName, null, null, null, (err && err.message) || 'Failed to load file.');
      })
      .fetchFileContent(fileName);
  }

  if (MODE === 'sidebar') {
    var autoToggle = document.getElementById('auto-update-toggle');
    if (autoToggle) {
      autoToggle.addEventListener('change', function () {
        google.script.run.setAutoUpdate(autoToggle.checked);
        if (autoToggle.checked) startPolling();
        else stopPolling();
      });
      google.script.run
        .withSuccessHandler(function (enabled) {
          autoToggle.checked = !!enabled;
          if (enabled) startPolling();
        })
        .withFailureHandler(function () { /* leave unchecked */ })
        .getAutoUpdate();
    }
  }
</script>
